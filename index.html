<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/vega@5.20.2"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5.1.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6.17.0"></script>

  <link rel="stylesheet" href="https://unpkg.com/purecss@2.0.3/build/pure-min.css">
  
  <link rel="stylesheet" type="text/css" href="css/styles.css" media="all">

  <title>Australian Climate Trends</title>
</head>

<body>

  <div class="pure-g" style="padding: 20px;">
    <div class="pure-u-1-1" style="text-align: center;">
      <h1>Climate Trends in Australian Cities</h1>
      <p>Exploring temperature and rainfall changes across major Australian capitals.</p>
    </div>

    <div class="pure-u-1-1">
      <div id="symbol_map" style="width: 100%;"></div>
    </div>

    <div class="pure-u-1-1">
      <div id="temp_trend" style="width: 100%;"></div>
    </div>
  </div>

  <script type="text/javascript">
    // Path to your JSON specification files
    var spec1 = "js/weather_map.vg.json";
    var spec2 = "js/temp_trend.vg.json";

    vegaEmbed('#symbol_map', spec1).then(function(result) {
      // Access the Vega view instance
    }).catch(console.error);

    vegaEmbed('#temp_trend', spec2).then(function(result) {
      // Access the Vega view instance
    }).catch(console.error);
  </script>

</body>
</html>
